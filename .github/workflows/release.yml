name: Release

# Build the VM-resident agent binary for a tag and attach it to the GitHub
# release. Templates run Windows Server, so the x86_64-pc-windows-msvc exe is
# what the console's clone worker embeds into each firstboot ISO
# (ORCHESTRATOR_AGENT_PATH on the worker host).

on:
  push:
    tags: ["v*"]

jobs:
  windows-binary:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release --target x86_64-pc-windows-msvc --bin pki-orchestrator
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-pc-windows-msvc/release/pki-orchestrator.exe
